<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title or "WKBL Moneyball Lab" }}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f6f1e7;
            --surface: #fff8f0;
            --surface-strong: #efe4d6;
            --ink: #1a1a1a;
            --ink-muted: #6b6259;
            --accent: #ff6b2c;
            --accent-2: #0f4c81;
            --accent-3: #0f9d8a;
            --line: rgba(26, 26, 26, 0.12);
            --shadow: 0 20px 50px rgba(26, 26, 26, 0.12);
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 12px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Manrope", "IBM Plex Sans KR", "Helvetica Neue", sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 10% 10%, rgba(255, 186, 141, 0.35), transparent 45%),
                radial-gradient(circle at 85% 12%, rgba(15, 76, 129, 0.25), transparent 40%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            inset: -30% -10% auto auto;
            width: 520px;
            height: 520px;
            background: repeating-linear-gradient(
                90deg,
                rgba(26, 26, 26, 0.04) 0,
                rgba(26, 26, 26, 0.04) 2px,
                transparent 2px,
                transparent 120px
            );
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        .page {
            position: relative;
            z-index: 1;
            padding-bottom: 64px;
        }

        .shell {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(12px);
            background: rgba(246, 241, 231, 0.92);
            border-bottom: 1px solid var(--line);
        }

        .site-header .shell {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .brand-title {
            font-family: "Bebas Neue", sans-serif;
            font-size: 28px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .brand-sub {
            font-size: 12px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ink-muted);
        }

        .nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: var(--ink-muted);
            font-size: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 700;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            color: var(--ink);
            border-color: var(--line);
        }

        .nav-link.is-active {
            color: #fff;
            background: var(--accent-2);
            border-color: var(--accent-2);
        }

        .hero {
            margin-top: 32px;
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
            gap: 28px;
            animation: heroIn 0.7s ease both;
        }

        .hero-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            padding: 28px;
            box-shadow: var(--shadow);
        }

        .hero-card h1 {
            font-family: "Bebas Neue", sans-serif;
            font-size: 48px;
            margin: 12px 0 10px;
            letter-spacing: 0.08em;
        }

        .hero-card p {
            margin: 0;
            color: var(--ink-muted);
            line-height: 1.6;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 12px;
        }

        .profile-logo,
        .profile-avatar {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line);
            background: #fff;
            overflow: hidden;
        }

        .profile-avatar {
            border-radius: 50%;
            background: rgba(15, 76, 129, 0.12);
            color: var(--accent-2);
            font-weight: 800;
        }

        .profile-logo img,
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-logo span,
        .profile-avatar span {
            font-size: 20px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .eyebrow {
            font-size: 12px;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--accent-2);
            font-weight: 700;
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
        }

        .pill {
            border-radius: 999px;
            border: 1px solid var(--line);
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            background: #fff;
        }

        .pill.accent {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .hero-metrics {
            display: grid;
            gap: 16px;
        }

        .metric {
            background: #fff;
            border-radius: var(--radius-md);
            border: 1px solid var(--line);
            padding: 20px;
            box-shadow: var(--shadow);
        }

        .metric-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--ink-muted);
            font-weight: 700;
        }

        .metric-value {
            font-size: 22px;
            font-weight: 800;
            margin-top: 10px;
        }

        .metric-sub {
            margin-top: 6px;
            font-size: 12px;
            color: var(--ink-muted);
        }

        .filters {
            margin-top: 26px;
            display: grid;
            gap: 18px;
        }

        .filter-group {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            padding: 16px;
            display: grid;
            gap: 12px;
        }

        .filter-label {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--ink-muted);
        }

        .filter-row {
            display: flex;
            flex-wrap: nowrap;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .filter-row::-webkit-scrollbar {
            display: none;
        }

        .chip {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 700;
            background: #fff;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            white-space: nowrap;
        }

        .chip:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(26, 26, 26, 0.12);
        }

        .chip.is-active {
            background: var(--chip-color, var(--accent-2));
            color: #fff;
            border-color: var(--chip-color, var(--accent-2));
        }

        .chip.pos {
            --chip-color: var(--accent-3);
        }

        .chip.sort {
            --chip-color: var(--accent);
        }

        .filter-input {
            width: 100%;
            border-radius: 999px;
            border: 1px solid var(--line);
            padding: 10px 16px;
            font-size: 12px;
            background: #fff;
            color: var(--ink);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .filter-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(255, 107, 44, 0.15);
        }

        .stat-list {
            margin-top: 26px;
            display: grid;
            gap: 16px;
        }

        .player-card {
            position: relative;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            padding: 18px 20px;
            box-shadow: var(--shadow);
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(0, 1.6fr) minmax(0, 0.7fr);
            gap: 18px;
            align-items: center;
            overflow: hidden;
            animation: cardIn 0.45s ease both;
            animation-delay: var(--delay, 0ms);
        }

        .player-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            background: var(--team-color, var(--accent-2));
        }

        .card-main {
            display: grid;
            grid-template-columns: auto auto auto 1fr;
            gap: 12px;
            align-items: center;
        }

        .game-tag {
            font-family: "JetBrains Mono", monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 6px 10px;
            background: var(--surface-strong);
            border-radius: 999px;
            color: var(--ink-muted);
        }

        .team-logo {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: #fff;
            border: 1px solid rgba(26, 26, 26, 0.08);
            display: grid;
            place-items: center;
            padding: 6px;
        }

        .team-logo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .player-photo {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: rgba(15, 76, 129, 0.1);
            border: 2px solid var(--team-color, var(--accent-2));
            font-weight: 800;
            color: var(--ink-muted);
            overflow: hidden;
        }

        .player-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-info {
            min-width: 0;
        }

        .player-name {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .player-meta {
            font-size: 12px;
            color: var(--ink-muted);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .pos-badge {
            padding: 2px 8px;
            border-radius: 999px;
            background: rgba(255, 107, 44, 0.12);
            color: var(--accent);
            font-weight: 700;
        }

        .card-stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }

        .stat {
            background: #fff;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(26, 26, 26, 0.08);
            padding: 8px 10px;
            text-align: center;
        }

        .stat span {
            display: block;
            font-size: 10px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--ink-muted);
            font-weight: 700;
        }

        .stat strong {
            font-size: 16px;
            font-weight: 800;
        }

        .stat strong.highlight {
            color: var(--accent-2);
        }

        .card-impact {
            display: grid;
            gap: 10px;
            justify-items: end;
        }

        .impact-label {
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ink-muted);
            font-weight: 700;
        }

        .impact-meter {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            border: 1px solid rgba(26, 26, 26, 0.12);
            background: #fff;
        }

        .meter-half {
            position: relative;
        }

        .meter-half span {
            position: absolute;
            top: 0;
            bottom: 0;
            display: block;
        }

        .meter-neg span {
            right: 0;
            background: linear-gradient(90deg, #f26c6c, #d64545);
        }

        .meter-pos span {
            left: 0;
            background: linear-gradient(90deg, #2fbf71, #1c8f5b);
        }

        .impact-value {
            font-family: "JetBrains Mono", monospace;
            font-size: 18px;
            font-weight: 800;
        }

        .eff-positive {
            color: #1c8f5b;
        }

        .eff-negative {
            color: #d64545;
        }

        .eff-neutral {
            color: var(--ink-muted);
        }

        .data-table {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: auto;
        }

        .data-table table {
            width: 100%;
            min-width: 960px;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 12px 14px;
            font-size: 12px;
            border-bottom: 1px solid var(--line);
            text-align: left;
        }

        .data-table th {
            background: rgba(15, 76, 129, 0.08);
            text-transform: uppercase;
            letter-spacing: 0.16em;
            font-weight: 700;
            color: var(--ink-muted);
        }

        .data-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.7);
        }

        .table-link {
            color: var(--accent-2);
            text-decoration: none;
            font-weight: 700;
        }

        .table-link:hover {
            text-decoration: underline;
        }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 20px;
            border-top: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.7);
        }

        .pagination-info {
            font-size: 12px;
            color: var(--ink-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .pagination-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .pagination-pages {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .pager {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--ink);
            background: #fff;
        }

        .pager:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .pager.is-disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .pager.is-current {
            background: var(--accent-2);
            border-color: var(--accent-2);
            color: #fff;
            pointer-events: none;
        }

        .pager.is-ellipsis {
            background: transparent;
            border-color: transparent;
            color: var(--ink-muted);
            pointer-events: none;
            padding: 0 4px;
        }

        .pager-status {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--ink-muted);
        }

        .stat-pill {
            font-family: "JetBrains Mono", monospace;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 999px;
            background: rgba(15, 76, 129, 0.12);
            color: var(--accent-2);
            font-weight: 600;
        }

        .compare-cell {
            display: grid;
            gap: 6px;
        }

        .compare-value {
            font-family: "JetBrains Mono", monospace;
            font-size: 12px;
            font-weight: 700;
        }

        .compare-bar {
            height: 8px;
            border-radius: 999px;
            background: rgba(15, 76, 129, 0.12);
            overflow: hidden;
        }

        .compare-bar span {
            display: block;
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent-2), var(--accent));
        }

        .empty-state {
            background: rgba(255, 255, 255, 0.9);
            border: 1px dashed var(--line);
            border-radius: var(--radius-lg);
            padding: 32px;
            text-align: center;
            color: var(--ink-muted);
            box-shadow: var(--shadow);
        }

        .empty-state h3 {
            margin: 0 0 8px;
            font-size: 18px;
            color: var(--ink);
        }

        .empty-state p {
            margin: 0;
            font-size: 13px;
        }

        .section-title {
            margin: 36px 0 12px;
            font-size: 16px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 800;
        }

        .section-sub {
            margin: 0 0 12px;
            font-size: 13px;
            color: var(--ink-muted);
        }

        @keyframes heroIn {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 980px) {
            .hero {
                grid-template-columns: 1fr;
            }

            .player-card {
                grid-template-columns: 1fr;
            }

            .card-main {
                grid-template-columns: auto auto 1fr;
            }

            .player-photo {
                width: 46px;
                height: 46px;
            }

            .card-stats {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .card-impact {
                justify-items: start;
            }

            .profile-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 640px) {
            .shell {
                padding: 0 16px;
            }

            .hero-card {
                padding: 22px;
            }

            .hero-card h1 {
                font-size: 38px;
            }

            .data-table th,
            .data-table td {
                padding: 10px;
                font-size: 11px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
    <script>
        document.addEventListener("htmx:afterSwap", (event) => {
            const target = event.detail && event.detail.target ? event.detail.target : null;
            if (!target) return;
            const ids = new Set([
                "players-table",
                "teams-table",
                "games-table",
                "boxscores-table",
                "standings-table",
            ]);
            if (ids.has(target.id)) {
                window.scrollTo({ top: 0, behavior: "smooth" });
            }
        });
    </script>
</head>
<body>
    <div class="page">
        <header class="site-header">
            <div class="shell">
                <div class="brand">
                    <div class="brand-title">WKBL</div>
                    <div class="brand-sub">Moneyball Lab</div>
                </div>
                <nav class="nav">
                    <a class="nav-link {% if active_page == 'home' %}is-active{% endif %}" href="/">Home</a>
                    <a class="nav-link {% if active_page == 'players' %}is-active{% endif %}" href="/players">Players</a>
                    <a class="nav-link {% if active_page == 'teams' %}is-active{% endif %}" href="/teams">Teams</a>
                    <a class="nav-link {% if active_page == 'standings' %}is-active{% endif %}" href="/standings">Standings</a>
                    <a class="nav-link {% if active_page == 'boxscores' %}is-active{% endif %}" href="/boxscores">Boxscores</a>
                    <a class="nav-link {% if active_page == 'games' %}is-active{% endif %}" href="/games">Game Log</a>
                    <a class="nav-link {% if active_page == 'compare' %}is-active{% endif %}" href="/compare">Compare</a>
                </nav>
            </div>
        </header>

        <main class="shell">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
