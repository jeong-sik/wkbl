{% if left and right %}
<div class="data-table table-scroll">
    <table>
        <thead>
            <tr>
                <th>Metric</th>
                <th>{{ left_label }}</th>
                <th>{{ right_label }}</th>
            </tr>
        </thead>
        <tbody>
            {% for row in metrics %}
            <tr>
                <td>{{ row.label }}</td>
                <td>
                    <div class="compare-cell">
                        <span class="compare-value">{{ row.left_display }}</span>
                        <div class="compare-bar">
                            <span style="width: {{ row.left_bar }}%;"></span>
                        </div>
                    </div>
                </td>
                <td>
                    <div class="compare-cell">
                        <span class="compare-value">{{ row.right_display }}</span>
                        <div class="compare-bar">
                            <span style="width: {{ row.right_bar }}%;"></span>
                        </div>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="empty-state">
    <h3>Select two {{ select_label | lower }}s</h3>
    <p>좌측과 우측 항목을 선택하면 비교표가 표시됩니다.</p>
</div>
{% endif %}
