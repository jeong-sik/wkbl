<header class="site-header">
    <div class="shell header-row">
        <div class="header-left">
            <div class="brand">
                <a href="/" class="brand-title">WKBL Dashboard</a>
            </div>
        </div>

        <div class="header-center">
            <div class="search-bar">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" placeholder="선수, 팀 검색..." class="search-input">
                <div class="kbd-hint">⌘K</div>
            </div>
        </div>

        <div class="header-right">
            <div class="season-selector">
                <span>2024-25</span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </div>
            
            <button class="icon-btn" aria-label="Refresh">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 4v6h-6"></path>
                    <path d="M1 20v-6h6"></path>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
            </button>

            <button class="icon-btn" aria-label="Notifications">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                <span class="badge">3</span>
            </button>
        </div>
    </div>
    
    <div class="shell">
        <nav class="nav">
            <a class="nav-link {% if active_page == 'home' %}is-active{% endif %}" href="/">Home</a>
            <a class="nav-link {% if active_page == 'players' %}is-active{% endif %}" href="/players">Players</a>
            <a class="nav-link {% if active_page == 'teams' %}is-active{% endif %}" href="/teams">Teams</a>
            <a class="nav-link {% if active_page == 'standings' %}is-active{% endif %}" href="/standings">Standings</a>
            <a class="nav-link {% if active_page == 'boxscores' %}is-active{% endif %}" href="/boxscores">Boxscores</a>
            <a class="nav-link {% if active_page == 'games' %}is-active{% endif %}" href="/games">Game Log</a>
            <a class="nav-link {% if active_page == 'compare' %}is-active{% endif %}" href="/compare">Compare</a>
            <a class="nav-link {% if active_page == 'qa' %}is-active{% endif %}" href="/qa">QA</a>
        </nav>
    </div>
</header>
