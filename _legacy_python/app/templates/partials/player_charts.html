{% if games %}
<div class="chart-container" style="position: relative; height:300px; width:100%; margin: 2rem 0;">
    <canvas id="gameLogChart"></canvas>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const gamesData = {{ games | tojson }};
    // Reverse needed because game log is usually newest first, but chart should be chronological (left to right)
    const chronoGames = [...gamesData].reverse();
    
    const labels = chronoGames.map(g => g.game_label + ' (' + (g.ym ? g.ym.substring(5) : '') + ')');
    const pts = chronoGames.map(g => g.pts);
    const reb = chronoGames.map(g => g.reb);
    const ast = chronoGames.map(g => g.ast);

    // Use team color or default
    const accentColor = '{{ pager_accent or "#0F4C81" }}';

    const ctx = document.getElementById('gameLogChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'PTS',
                    data: pts,
                    borderColor: accentColor,
                    backgroundColor: accentColor,
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 3,
                    yAxisID: 'y'
                },
                {
                    label: 'REB',
                    data: reb,
                    borderColor: '#666',
                    backgroundColor: '#666',
                    borderDash: [5, 5],
                    tension: 0.3,
                    borderWidth: 1.5,
                    pointRadius: 2,
                    yAxisID: 'y'
                },
                {
                    label: 'AST',
                    data: ast,
                    borderColor: '#aaa',
                    backgroundColor: '#aaa',
                    borderDash: [2, 2],
                    tension: 0.3,
                    borderWidth: 1.5,
                    pointRadius: 2,
                    yAxisID: 'y'
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',
                intersect: false,
            },
            plugins: {
                title: {
                    display: true,
                    text: 'Season Trend (PTS / REB / AST)',
                    font: { size: 14, weight: 'bold' },
                    padding: { bottom: 20 }
                },
                legend: {
                    position: 'bottom'
                },
                tooltip: {
                    backgroundColor: 'rgba(0, 0, 0, 0.8)',
                    padding: 12,
                    callbacks: {
                        footer: function(tooltipItems) {
                            const idx = tooltipItems[0].dataIndex;
                            const game = chronoGames[idx];
                            return '\nVs: ' + (game.opp_team || 'Unknown') + '\nMIN: ' + (game.min_display || '0:00') + '\nEFF: ' + game.eff;
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    grid: { color: '#f0f0f0' },
                    ticks: { font: { size: 11 } }
                },
                x: {
                    grid: { display: false },
                    ticks: { 
                        font: { size: 10 },
                        maxRotation: 45,
                        minRotation: 45
                    }
                }
            }
        }
    });
});
</script>
{% endif %}
