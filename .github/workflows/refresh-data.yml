name: Refresh WKBL Data

on:
  schedule:
    # 매일 03:00 UTC (한국시간 12:00)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      season:
        description: "Optional season code (e.g., 046). Leave blank for current season."
        required: false
        default: ""
      run_boxscore:
        description: "Run boxscore sync (true/false)"
        required: false
        default: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.0

      - name: Cache opam dependencies
        uses: actions/cache@v4
        with:
          path: ~/.opam
          key: ${{ runner.os }}-opam-${{ hashFiles('apps/api/dune-project', 'apps/api/*.opam') }}
          restore-keys: |
            ${{ runner.os }}-opam-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libev-dev \
            libssl-dev \
            libpq-dev \
            libgmp-dev \
            libffi-dev \
            libsqlite3-dev \
            liburing-dev \
            pkg-config \
            perl

      - name: Install dependencies
        run: |
          cd apps/api
          opam update
          opam pin add -n -y grpc-direct https://github.com/jeong-sik/grpc-direct.git
          opam pin add -n -y grpc-direct-core https://github.com/jeong-sik/grpc-direct.git
          opam pin add -n -y ocaml-webrtc https://github.com/jeong-sik/ocaml-webrtc.git
          opam pin add -n -y kirin https://github.com/jeong-sik/kirin.git
          opam install . --deps-only --yes

      - name: Build scraper tool
        run: |
          cd apps/api
          opam exec -- dune build bin/scraper_tool.exe

      - name: Sync schedule
        env:
          WKBL_DATABASE_URL: ${{ secrets.WKBL_DATABASE_URL }}
        run: |
          cd apps/api
          opam exec -- dune exec bin/scraper_tool.exe -- sync schedule

      - name: Sync games (DataLab results)
        env:
          WKBL_DATABASE_URL: ${{ secrets.WKBL_DATABASE_URL }}
          SEASON: ${{ inputs.season }}
        run: |
          cd apps/api
          if [ -n "${SEASON}" ]; then
            opam exec -- dune exec bin/scraper_tool.exe -- sync games --season="${SEASON}"
          else
            opam exec -- dune exec bin/scraper_tool.exe -- sync games
          fi

      - name: Sync boxscores
        if: ${{ inputs.run_boxscore != 'false' }}
        env:
          WKBL_DATABASE_URL: ${{ secrets.WKBL_DATABASE_URL }}
          SEASON: ${{ inputs.season }}
        run: |
          cd apps/api
          if [ -n "${SEASON}" ]; then
            opam exec -- dune exec bin/scraper_tool.exe -- sync boxscore --season="${SEASON}"
          else
            opam exec -- dune exec bin/scraper_tool.exe -- sync boxscore
          fi

      - name: Sync play-by-play (live text)
        env:
          WKBL_DATABASE_URL: ${{ secrets.WKBL_DATABASE_URL }}
          SEASON: ${{ inputs.season }}
        run: |
          cd apps/api
          if [ -n "${SEASON}" ]; then
            opam exec -- dune exec bin/scraper_tool.exe -- sync pbp --season="${SEASON}"
          else
            opam exec -- dune exec bin/scraper_tool.exe -- sync pbp
          fi
